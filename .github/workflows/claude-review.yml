name: Gemini PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            You are reviewing a GitHub pull request. Use the gh CLI to get
            the diff (gh pr diff) and post your review as a PR comment
            (gh pr comment). Focus on:

            1. Code quality: bugs, logic errors, unhandled edge cases,
               null/undefined issues, error handling gaps.
            2. Project conventions (flag any violations):
               - Database table and column names must be lowercase snake_case
                 (e.g. user_id, not UserID or userId)
               - Check migration files and SQL for naming violations

            Be concise. Only comment on real issues — don't praise or
            state the obvious. If everything looks good, say so briefly.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_CLI_TRUST_WORKSPACE: "true"
